<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="SaintEx — Jeu de lettres">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="SaintEx">
    <meta name="apple-mobile-web-app-title" content="SaintEx">
    <link rel="stylesheet" href="saintex.css">
    <link rel="shortcut icon" href="Images/favicon-32x32.png">
    <link rel="apple-touch-icon" href="Images/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>SaintEx</title>
</head>
<body>

    <!-- ===== ÉCRAN SPLASH ===== -->
    <div id="splash">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="bg-circle c3"></div>
        <div class="bg-circle c4"></div>
        <div class="cadre"></div>
        <div class="splash-titre">SaintEx</div>
        <div class="splash-sous">Jeu de lettres</div>
        <div class="splash-cercles">
            <div class="sc sc1"></div>
            <div class="sc sc2"></div>
            <div class="sc sc3"></div>
            <div class="sc sc4"></div>
        </div>
        <button class="btn-splash" onclick="cacherSplash()">Jouer</button>

    </div>

    <!-- ===== EN-TÊTE ===== -->
    <header id="header" style="display:none;">
        <div class="entete">
            <img class="logo" src="Images/Logo.png" alt="Logo SaintEx">
            <p id="titrePartie" class="titre-partie"></p>
            <button id="btn-retour" onclick="retourAccueil()">← Mode</button>
        </div>
    </header>

    <!-- ===== ÉCRAN D'ACCUEIL ===== -->
    <nav id="nav" style="display:none;">
        <form id="form4" name="form4">

            <fieldset class="choix-groupe">
                <legend>Longueur du mot</legend>
                <div class="choix-ligne">
                    <label class="choix-label">
                        <input type="radio" name="longueur" value="4" checked>
                        <span class="choix-btn">4 lettres</span>
                    </label>
                    <label class="choix-label">
                        <input type="radio" name="longueur" value="5">
                        <span class="choix-btn">5 lettres</span>
                    </label>
                </div>
            </fieldset>

            <fieldset class="choix-groupe">
                <legend>Catégories</legend>
                <div class="choix-ligne">
                    <label class="choix-label check-label">
                        <input type="checkbox" name="categorie" value="noms" checked>
                        <span class="choix-btn">Noms</span>
                    </label>
                    <label class="choix-label check-label">
                        <input type="checkbox" name="categorie" value="verbes" checked>
                        <span class="choix-btn">Verbes</span>
                    </label>
                    <label class="choix-label check-label">
                        <input type="checkbox" name="categorie" value="adjectifs" checked>
                        <span class="choix-btn">Adjectifs</span>
                    </label>
                    <label class="choix-label check-label">
                        <input type="checkbox" name="categorie" value="adverbes">
                        <span class="choix-btn">Adverbes</span>
                    </label>
                    <label class="choix-label check-label"
                           title="Prépositions, pronoms, conjonctions, onomatopées">
                        <input type="checkbox" name="categorie" value="autres">
                        <span class="choix-btn">Autres ⓘ</span>
                    </label>
                </div>
            </fieldset>

            <!-- Dossier thèmes dépliable -->
            <div class="dossier" id="dossier-theme">
                <button type="button" class="dossier-btn" onclick="toggleThemes()">
                    <span id="dossier-icone">▶</span> Thèmes
                    <span class="dossier-actif" id="theme-actif-label"></span>
                </button>
                <div class="dossier-contenu" id="dossier-contenu" style="display:none;">
                    <div class="choix-ligne themes-grille">
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="" checked
                                   onchange="majThemeLabel('')">
                            <span class="choix-btn">Aucun</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="cuisine"
                                   onchange="majThemeLabel('🍽️ Cuisine')">
                            <span class="choix-btn">🍽️ Cuisine</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="nature"
                                   onchange="majThemeLabel('🌿 Nature')">
                            <span class="choix-btn">🌿 Nature</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="sport"
                                   onchange="majThemeLabel('⚽ Sport')">
                            <span class="choix-btn">⚽ Sport</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="animaux"
                                   onchange="majThemeLabel('🐾 Animaux')">
                            <span class="choix-btn">🐾 Animaux</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="vetements"
                                   onchange="majThemeLabel('👗 Vêtements')">
                            <span class="choix-btn">👗 Vêtements</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="corps"
                                   onchange="majThemeLabel('🫀 Corps')">
                            <span class="choix-btn">🫀 Corps</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="maison"
                                   onchange="majThemeLabel('🏠 Maison')">
                            <span class="choix-btn">🏠 Maison</span>
                        </label>
                        <label class="choix-label theme-label">
                            <input type="radio" name="theme" value="mer"
                                   onchange="majThemeLabel('🌊 Mer')">
                            <span class="choix-btn">🌊 Mer</span>
                        </label>
                    </div>
                </div>
            </div>

                        <div class="btn-comment-wrap">
                <button type="button" class="btn-comment"
                        data-tooltip="Devinez un mot de 4 ou 5 lettres. Tapez avec le clavier et validez avec ✓. Le jeu indique combien de lettres sont bien placées. Langue au chat révèle le mot."
                        onclick="this.classList.toggle('actif')"
                        onblur="this.classList.remove('actif')">? Comment jouer</button>
            </div>

            <button type="button" class="btn-jouer" onclick="choixprop()">Jouer</button>

        </form>
    </nav>

    <!-- ===== ZONE DE JEU ===== -->
    <div id="zone-jeu" style="display:none;">

        <!-- Liste des propositions -->
        <div id="pave" class="pave"></div>

        <!-- Message victoire -->
        <div class="gagne" id="gagne">
            Gagné en <span id="nombreCoups"></span>
        </div>

        <!-- Mot en cours de saisie -->
        <div class="mot-en-cours">
            <div id="affichage-mot" class="affichage-mot">_ _ _ _</div>
            <div id="error" class="error-msg">Mot inconnu</div>
            <div id="triche" class="triche-msg"></div>
        </div>

        <!-- Clavier AZERTY intégré -->
        <div class="clavier">
            <div class="clavier-rangee">
                <button class="touche" onclick="ajouterLettre('A')">A</button>
                <button class="touche" onclick="ajouterLettre('Z')">Z</button>
                <button class="touche" onclick="ajouterLettre('E')">E</button>
                <button class="touche" onclick="ajouterLettre('R')">R</button>
                <button class="touche" onclick="ajouterLettre('T')">T</button>
                <button class="touche" onclick="ajouterLettre('Y')">Y</button>
                <button class="touche" onclick="ajouterLettre('U')">U</button>
                <button class="touche" onclick="ajouterLettre('I')">I</button>
                <button class="touche" onclick="ajouterLettre('O')">O</button>
                <button class="touche" onclick="ajouterLettre('P')">P</button>
            </div>
            <div class="clavier-rangee">
                <button class="touche" onclick="ajouterLettre('Q')">Q</button>
                <button class="touche" onclick="ajouterLettre('S')">S</button>
                <button class="touche" onclick="ajouterLettre('D')">D</button>
                <button class="touche" onclick="ajouterLettre('F')">F</button>
                <button class="touche" onclick="ajouterLettre('G')">G</button>
                <button class="touche" onclick="ajouterLettre('H')">H</button>
                <button class="touche" onclick="ajouterLettre('J')">J</button>
                <button class="touche" onclick="ajouterLettre('K')">K</button>
                <button class="touche" onclick="ajouterLettre('L')">L</button>
                <button class="touche" onclick="ajouterLettre('M')">M</button>
            </div>
            <div class="clavier-rangee">
                <button class="touche touche-large" onclick="effacer()">⌫</button>
                <button class="touche" onclick="ajouterLettre('W')">W</button>
                <button class="touche" onclick="ajouterLettre('X')">X</button>
                <button class="touche" onclick="ajouterLettre('C')">C</button>
                <button class="touche" onclick="ajouterLettre('V')">V</button>
                <button class="touche" onclick="ajouterLettre('B')">B</button>
                <button class="touche" onclick="ajouterLettre('N')">N</button>
                <button class="touche touche-large touche-ok" onclick="valider()">✓</button>
            </div>
            <div class="clavier-rangee clavier-actions">
                <button class="touche-action" id="chat" onclick="langueAuChat()">Langue au chat</button>
                <button class="touche-action" id="rejouer"
                        style="display:none"
                        onclick="window.location.reload()">Rejouer ?</button>
            </div>
        </div>

    </div>

    <footer id="footer" style="display:none;">
        <p class="copyright">© François Denivet — Décembre 2021</p>
    </footer>

    <script src="themes.js"></script>
    <script src="saintex.js"></script>
    <script src="app.js"></script>
    <script>
        function toggleThemes() {
            const c = document.getElementById('dossier-contenu');
            const i = document.getElementById('dossier-icone');
            if (c.style.display === 'none') {
                c.style.display = 'block';
                i.textContent = '▼';
            } else {
                c.style.display = 'none';
                i.textContent = '▶';
            }
        }

        function majThemeLabel(label) {
            document.getElementById('theme-actif-label').textContent =
                label ? '· ' + label : '';
        }

        function cacherSplash() {
            document.getElementById('splash').style.display  = 'none';
            document.getElementById('header').style.display  = 'block';
            document.getElementById('nav').style.display     = 'block';
            document.getElementById('footer').style.display  = 'block';
        }

    </script>

</body>

</html>
