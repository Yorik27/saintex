<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <meta name="theme-color" content="#111111">
    <title>SaintEx — Défi Humain</title>
    <link rel="stylesheet" href="saintex.css">
    <style>
        body {
            background: #111;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header-jeu2 {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(0,191,255,0.15);
            background: #111;
            z-index: 30;
            gap: 8px;
        }
        .header-jeu2 .logo { height: 34px; flex-shrink: 0; }
        .header-centre {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .header-longueur {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.78rem;
            color: deepskyblue;
            letter-spacing: 2px;
        }
        .header-tour {
            font-size: 0.72rem;
            letter-spacing: 1px;
            padding: 2px 10px;
            border-radius: 50px;
            font-family: 'bigelowrules', Georgia, serif;
        }
        .tour-moi {
            background: rgba(0,204,102,0.15);
            border: 1px solid rgba(0,204,102,0.4);
            color: #00cc66;
        }
        .tour-adversaire {
            background: rgba(255,153,0,0.12);
            border: 1px solid rgba(255,153,0,0.35);
            color: #ff9900;
        }
        #header-timer {
            font-family: 'Roboto', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(0,191,255,0.7);
            letter-spacing: 1px;
        }
        .header-droite {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
            flex-shrink: 0;
        }
        .header-score {
            font-family: 'Roboto', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }
        .btn-abandon-header {
            background: transparent;
            border: 1px solid rgba(255,68,68,0.35);
            color: rgba(255,68,68,0.7);
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.72rem;
            letter-spacing: 1px;
            padding: 2px 7px;
            border-radius: 50px;
            cursor: pointer;
        }

        /* ── Zone principale ── */
        .zone-principale {
            position: fixed;
            top: 54px;
            left: 0; right: 0;
            bottom: 208px;
            overflow-y: auto;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── Mon mot secret ── */
        .section-label {
            font-size: 0.72rem;
            color: rgba(0,191,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .cases-mot {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .case-mot-secret {
            width: 44px;
            height: 44px;
            border: 1.5px solid rgba(0,191,255,0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: deepskyblue;
            background: rgba(0,191,255,0.06);
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .case-mot-secret.scan {
            background: rgba(255,153,0,0.25);
            border-color: rgba(255,153,0,0.8);
            color: #ff9900;
        }

        /* ── Proposition adversaire ── */
        .zone-adversaire {
            background: rgba(0,191,255,0.05);
            border: 1px solid rgba(0,191,255,0.2);
            border-radius: 12px;
            padding: 10px 14px;
        }
        .adversaire-derniere {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .adversaire-mot {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: deepskyblue;
            letter-spacing: 3px;
            letter-spacing: 2px;
        }
        .adversaire-score {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1.1rem;
        }

        /* Cases vides adversaire */
        .cases-adversaire {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .case-adv {
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(0,191,255,0.2);
            border-radius: 7px;
            background: rgba(0,191,255,0.04);
        }

        /* ── Mes propositions ── */
        .zone-propositions {
            flex: 1;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }
        .zone-propositions {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 2px 8px !important;
            max-height: 80px !important;
            overflow-y: auto !important;
        }
        .ligne-prop {
            display: flex;
            align-items: center;
            gap: 4px;
            border-bottom: none;
            padding: 0;
        }
        .prop-mot {
            font-family: 'Roboto', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
        }
        .prop-score {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
        }
        .score-0 { color: rgba(255,255,255,0.3); }
        .score-1 { color: #fff700; }
        .score-2 { color: #ff9900; }
        .score-3 { color: #ff6600; }
        .score-4 { color: #ff3300; }
        .score-5 { color: #ff0000; }
        .score-gagne { color: #00cc66; }

        /* ── Affichage mot en saisie ── */
        .zone-saisie {
            position: fixed;
            bottom: 128px;
            left: 0; right: 0;
            background: #111;
            display: flex;
            justify-content: center;
            padding: 4px 0;
            z-index: 20;
        }

        /* ── Clavier ── */
        .zone-clavier {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: #111;
            padding: 2px 0 6px;
            z-index: 20;
        }

        /* ── Message tour ── */
        .msg-attente {
            text-align: center;
            color: rgba(255,153,0,0.7);
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            padding: 8px;
            animation: clignoter 1.5s ease-in-out infinite;
        }
        @keyframes clignoter {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ── Saisie du mot secret (phase init) ── */
        #phase-init {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 20px;
            gap: 16px;
        }
        .init-titre {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1.1rem;
            color: deepskyblue;
            letter-spacing: 2px;
            text-align: center;
        }
        .init-sous {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }
        .init-adversaire {
            font-size: 0.85rem;
            color: rgba(255,153,0,0.7);
            text-align: center;
        }

        /* ── Fin de partie ── */
        .overlay-fin {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .overlay-fin.visible { display: flex; }
        .fin-contenu {
            background: #1a1a2e;
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .fin-titre {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .fin-gagne { color: #00cc66; }
        .fin-perdu { color: #ff4444; }
        .fin-info {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 20px;
        }
        .fin-mot-secret {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1.3rem;
            color: deepskyblue;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .btn-fin {
            background: rgba(0,191,255,0.12);
            border: 1px solid rgba(0,191,255,0.4);
            color: deepskyblue;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            cursor: pointer;
            display: block;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-fin:hover { background: rgba(0,191,255,0.2); }
        .btn-fin-retour {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.4);
            padding: 8px 24px;
            border-radius: 50px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            display: block;
            width: 100%;
        }

        #phase-jeu { display: none; }

        /* Lettres bien placées en vert pendant scan */
        .case-mot-secret.scan-ok {
            background: rgba(0,204,102,0.25) !important;
            border-color: rgba(0,204,102,0.9) !important;
            color: #00cc66 !important;
        }

        /* Phase init - attente adversaire */
        .init-attente {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px;
        }
        .init-attente-titre {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1rem;
            color: #00cc66;
            letter-spacing: 2px;
        }
        .init-attente-info {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }
        .init-adversaire-statut {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid rgba(255,153,0,0.3);
            border-radius: 50px;
            font-size: 0.85rem;
        }
        .init-adversaire-statut.pret {
            border-color: rgba(0,204,102,0.5);
            color: #00cc66;
        }
        .init-adversaire-statut.attente {
            border-color: rgba(255,153,0,0.3);
            color: rgba(255,153,0,0.7);
        }
        .dot-anim {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ff9900;
            animation: pulse 1s ease-in-out infinite;
        }
        .dot-anim.pret { background: #00cc66; animation: none; }

        /* Modal timeout/abandon */
        .modal-timeout {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 60;
            align-items: center;
            justify-content: center;
        }
        .modal-timeout.visible { display: flex; }
        .modal-timeout-contenu {
            background: #1a1a2e;
            border: 1px solid rgba(255,68,68,0.3);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            max-width: 280px;
            width: 90%;
        }
        .modal-timeout-titre {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 1.1rem;
            color: #ff4444;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .modal-timeout-info {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }
        .btn-timeout {
            background: rgba(0,191,255,0.12);
            border: 1px solid rgba(0,191,255,0.4);
            color: deepskyblue;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.9rem;
            cursor: pointer;
            display: block;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-abandon {
            background: transparent;
            border: 1px solid rgba(255,68,68,0.3);
            color: rgba(255,68,68,0.7);
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            display: block;
            width: 100%;
        }

        /* Bouton flottant chat */
        .btn-chat-flottant {
            position: fixed;
            bottom: 130px;
            right: 10px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(0,191,255,0.15);
            border: 1.5px solid rgba(0,191,255,0.5);
            color: deepskyblue;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            box-shadow: 0 0 16px rgba(0,191,255,0.2);
            transition: background 0.2s;
        }
        .btn-chat-flottant:hover { background: rgba(0,191,255,0.25); }
        .badge-chat {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
        }
        .badge-chat.visible { display: flex; }

        /* Popup chat */
        .popup-chat {
            position: fixed;
            bottom: 180px;
            right: 10px;
            width: min(300px, calc(100vw - 20px));
            background: #1a1a2e;
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 16px;
            z-index: 45;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .popup-chat.visible { display: flex; }

        .popup-chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,191,255,0.12);
        }
        .popup-chat-titre {
            font-family: 'bigelowrules', Georgia, serif;
            font-size: 0.85rem;
            color: deepskyblue;
            letter-spacing: 1px;
        }
        .btn-fermer-chat {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            cursor: pointer;
            padding: 0 4px;
        }

        .dialogue-messages {
            max-height: 140px;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .msg-ligne {
            font-size: 0.78rem;
            line-height: 1.4;
            padding: 4px 8px;
            border-radius: 8px;
            max-width: 85%;
        }
        .msg-moi {
            color: white;
            background: rgba(0,191,255,0.15);
            align-self: flex-end;
            text-align: right;
        }
        .msg-adv {
            color: white;
            background: rgba(255,153,0,0.12);
            align-self: flex-start;
        }
        .msg-pseudo {
            font-weight: 700;
            font-size: 0.7rem;
            display: block;
            margin-bottom: 1px;
            opacity: 0.7;
        }
        .msg-moi .msg-pseudo { color: deepskyblue; }
        .msg-adv .msg-pseudo { color: #ff9900; }

        .reactions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            padding: 6px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .btn-reaction {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 3px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-reaction:hover { background: rgba(0,191,255,0.15); }

        .dialogue-input-zone {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .dialogue-input {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 50px;
            padding: 5px 12px;
            color: white;
            font-family: 'Roboto', sans-serif;
            font-size: 0.82rem;
            outline: none;
        }
        .dialogue-input:focus { border-color: deepskyblue; }
        .btn-envoyer {
            background: rgba(0,191,255,0.15);
            border: 1px solid rgba(0,191,255,0.4);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: deepskyblue;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .zone-principale { overflow-y: auto; padding: 8px 14px; gap: 8px; max-height: 45vh; }

        /* Case active saisie désordre */
        .case-saisie-active {
            border-color: #ff4444 !important;
            box-shadow: 0 0 8px rgba(255,68,68,0.5) !important;
        }

        /* Override clavier jeu2 */
        #clavier-jeu .clavier-rangee,
        #clavier-init .clavier-rangee {
            gap: 3px !important;
            padding: 2px 4px !important;
        }
        #clavier-jeu .touche,
        #clavier-init .touche {
            background: #111 !important;
            border: 1.5px solid rgba(0,191,255,0.5) !important;
            color: white !important;
            font-weight: 700 !important;
            font-family: 'Roboto', sans-serif !important;
            width: 32px !important;
            height: 32px !important;
            min-width: 32px !important;
            padding: 0 !important;
            font-size: 0.85rem !important;
            border-radius: 6px !important;
            flex: none !important;
        }
        #clavier-jeu .touche-large,
        #clavier-init .touche-large {
            width: 44px !important;
            min-width: 44px !important;
        }
        #clavier-jeu .touche:active,
        #clavier-init .touche:active {
            background: rgba(0,191,255,0.15) !important;
        }
        #clavier-jeu .touche-ok,
        #clavier-init .touche-ok {
            background: rgba(0,191,255,0.2) !important;
            border-color: deepskyblue !important;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header-jeu2">
        <img class="logo" src="Images/Logo.png" alt="Logo SaintEx">
        <div class="header-centre">
            <div class="header-longueur" id="header-longueur">4 lettres</div>
            <div class="header-tour tour-moi" id="header-tour">Ton tour</div>
            <div id="header-timer">2:00</div>
        </div>
        <div class="header-droite">
            <div class="header-score" id="header-score"></div>
            <button class="btn-abandon-header" onclick="proposerAbandon()">Abandon</button>
        </div>
    </div>

    <!-- Phase init : saisie du mot secret -->
    <div id="phase-init">
        <div class="init-titre">Choisis ton mot secret</div>
        <div class="init-sous" id="init-sous">Ton adversaire ne le verra pas</div>
        <div class="init-adversaire" id="init-adversaire"></div>

        <!-- Cases de saisie du mot secret -->
        <div id="cases-init" class="cases-mot"></div>

        <!-- Clavier pour saisir le mot secret -->
        <div class="clavier" id="clavier-init">
            <div class="clavier-rangee">
                <button class="touche" onclick="ajouterLettreInit('A')">A</button>
                <button class="touche" onclick="ajouterLettreInit('Z')">Z</button>
                <button class="touche" onclick="ajouterLettreInit('E')">E</button>
                <button class="touche" onclick="ajouterLettreInit('R')">R</button>
                <button class="touche" onclick="ajouterLettreInit('T')">T</button>
                <button class="touche" onclick="ajouterLettreInit('Y')">Y</button>
                <button class="touche" onclick="ajouterLettreInit('U')">U</button>
                <button class="touche" onclick="ajouterLettreInit('I')">I</button>
                <button class="touche" onclick="ajouterLettreInit('O')">O</button>
                <button class="touche" onclick="ajouterLettreInit('P')">P</button>
            </div>
            <div class="clavier-rangee">
                <button class="touche" onclick="ajouterLettreInit('Q')">Q</button>
                <button class="touche" onclick="ajouterLettreInit('S')">S</button>
                <button class="touche" onclick="ajouterLettreInit('D')">D</button>
                <button class="touche" onclick="ajouterLettreInit('F')">F</button>
                <button class="touche" onclick="ajouterLettreInit('G')">G</button>
                <button class="touche" onclick="ajouterLettreInit('H')">H</button>
                <button class="touche" onclick="ajouterLettreInit('J')">J</button>
                <button class="touche" onclick="ajouterLettreInit('K')">K</button>
                <button class="touche" onclick="ajouterLettreInit('L')">L</button>
                <button class="touche" onclick="ajouterLettreInit('M')">M</button>
            </div>
            <div class="clavier-rangee">
                <button class="touche touche-large" onclick="effacerInit()">⌫</button>
                <button class="touche" onclick="ajouterLettreInit('W')">W</button>
                <button class="touche" onclick="ajouterLettreInit('X')">X</button>
                <button class="touche" onclick="ajouterLettreInit('C')">C</button>
                <button class="touche" onclick="ajouterLettreInit('V')">V</button>
                <button class="touche" onclick="ajouterLettreInit('B')">B</button>
                <button class="touche" onclick="ajouterLettreInit('N')">N</button>
                <button class="touche touche-large touche-ok" onclick="validerMotSecret()">✓</button>
            </div>
        </div>
    </div>

    <!-- Phase jeu -->
    <div id="phase-jeu">

        <div class="zone-principale">

            <!-- Mon mot secret -->
            <div>
                <div class="section-label">Mon mot</div>
                <div class="cases-mot" id="cases-mon-mot"></div>
            </div>

            <!-- Avancement adversaire -->
            <div class="zone-adversaire">
                <div class="section-label" id="label-adversaire">Adversaire</div>
                <div class="adv-progression">
                    <div class="adv-points" id="adv-points"></div>
                    <div class="adv-nb" id="adv-nb">0 lettre trouvée</div>
                </div>
                <div class="cases-adversaire" id="cases-adv"></div>
            </div>

            <!-- Mes propositions -->
            <div>
                <div class="section-label">Mes propositions</div>
                <div class="zone-propositions" id="liste-props"></div>
            </div>

        </div>

        <!-- Affichage mot en saisie -->
        <div class="zone-saisie" style="padding: 6px 14px; min-height: 56px; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="affichage-saisie" class="cases-mot"></div>
            <div id="msg-attente" class="msg-attente" style="display:none;">Tour de l'adversaire…</div>
            <div id="error-jeu2" style="display:none; color:#ff4444; text-align:center; font-size:0.85rem; padding:4px;"></div>
        </div>

        <!-- Clavier jeu -->
        <div class="zone-clavier">
            <div class="clavier" id="clavier-jeu">
                <div class="clavier-rangee">
                    <button class="touche" onclick="ajouterLettre('A')">A</button>
                    <button class="touche" onclick="ajouterLettre('Z')">Z</button>
                    <button class="touche" onclick="ajouterLettre('E')">E</button>
                    <button class="touche" onclick="ajouterLettre('R')">R</button>
                    <button class="touche" onclick="ajouterLettre('T')">T</button>
                    <button class="touche" onclick="ajouterLettre('Y')">Y</button>
                    <button class="touche" onclick="ajouterLettre('U')">U</button>
                    <button class="touche" onclick="ajouterLettre('I')">I</button>
                    <button class="touche" onclick="ajouterLettre('O')">O</button>
                    <button class="touche" onclick="ajouterLettre('P')">P</button>
                </div>
                <div class="clavier-rangee">
                    <button class="touche" onclick="ajouterLettre('Q')">Q</button>
                    <button class="touche" onclick="ajouterLettre('S')">S</button>
                    <button class="touche" onclick="ajouterLettre('D')">D</button>
                    <button class="touche" onclick="ajouterLettre('F')">F</button>
                    <button class="touche" onclick="ajouterLettre('G')">G</button>
                    <button class="touche" onclick="ajouterLettre('H')">H</button>
                    <button class="touche" onclick="ajouterLettre('J')">J</button>
                    <button class="touche" onclick="ajouterLettre('K')">K</button>
                    <button class="touche" onclick="ajouterLettre('L')">L</button>
                    <button class="touche" onclick="ajouterLettre('M')">M</button>
                </div>
                <div class="clavier-rangee">
                    <button class="touche touche-large" onclick="effacer()">⌫</button>
                    <button class="touche" onclick="ajouterLettre('W')">W</button>
                    <button class="touche" onclick="ajouterLettre('X')">X</button>
                    <button class="touche" onclick="ajouterLettre('C')">C</button>
                    <button class="touche" onclick="ajouterLettre('V')">V</button>
                    <button class="touche" onclick="ajouterLettre('B')">B</button>
                    <button class="touche" onclick="ajouterLettre('N')">N</button>
                    <button class="touche touche-large touche-ok" onclick="valider()">✓</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Bouton flottant chat -->
    <button class="btn-chat-flottant" id="btn-chat-flottant" style="display:none;" onclick="toggleChat()">
        💬
        <span class="badge-chat" id="badge-chat"></span>
    </button>

    <!-- Popup chat -->
    <div id="overlay-chat" onclick="toggleChat()" style="display:none; position:fixed; inset:0; z-index:44; background:rgba(0,0,0,0.4);"></div>
    <div class="popup-chat" id="popup-chat">
        <div class="popup-chat-header">
            <span class="popup-chat-titre">💬 Discussion</span>
            <button class="btn-fermer-chat" onclick="toggleChat()">✕</button>
        </div>
        <div class="dialogue-messages" id="dialogue-messages"></div>
        <div class="reactions">
            <button class="btn-reaction" onclick="envoyerReaction('👍 Bien joué !')">👍</button>
            <button class="btn-reaction" onclick="envoyerReaction('😅 Presque !')">😅</button>
            <button class="btn-reaction" onclick="envoyerReaction('🤔 Hmm...')">🤔</button>
            <button class="btn-reaction" onclick="envoyerReaction('😈 Tu chauffes !')">😈</button>
            <button class="btn-reaction" onclick="envoyerReaction('🎯 Chaud !')">🎯</button>
            <button class="btn-reaction" onclick="envoyerReaction('😂 Raté !')">😂</button>
        </div>
        <div class="dialogue-input-zone">
            <input class="dialogue-input" id="dialogue-input" type="text"
                   placeholder="Message…" maxlength="50"
                   onkeydown="if(event.key==='Enter') envoyerMessage()">
            <button class="btn-envoyer" onclick="envoyerMessage()">➤</button>
        </div>
    </div>

    <!-- Modal timeout/abandon -->
    <div class="modal-timeout" id="modal-timeout">
        <div class="modal-timeout-contenu">
            <div class="modal-timeout-titre" id="timeout-titre">Temps écoulé</div>
            <div class="modal-timeout-info" id="timeout-info">Ton adversaire n'a pas joué à temps.</div>
            <button class="btn-timeout" onclick="window.location.href='multi.html'">Nouvelle partie</button>
            <button class="btn-abandon" onclick="confirmerAbandon()">Abandonner la partie</button>
        </div>
    </div>

    <!-- Overlay fin de partie -->
    <div class="overlay-fin" id="overlay-fin">
        <div class="fin-contenu">
            <div class="fin-titre" id="fin-titre"></div>
            <div class="fin-info" id="fin-info"></div>
            <div class="fin-mot-secret" id="fin-mot-adv"></div>
            <button class="btn-fin" onclick="demanderRevanche()">Revanche ⚔</button>
            <button class="btn-fin-retour" onclick="window.location.href='multi.html'">← Retour</button>
        </div>
    </div>

    <script>
    // ── Paramètres de la partie (simulés — viendront de Supabase) ──
    // Paramètres lus depuis sessionStorage (passés par multi.html)
    // Valeurs par défaut pour test direct
    const LONGUEUR = parseInt(sessionStorage.getItem('longueur') || '4');
    const MON_PSEUDO = sessionStorage.getItem('mon_pseudo') || 'Joueur A';
    const ADV_PSEUDO = sessionStorage.getItem('adv_pseudo') || 'Joueur B';
    const JE_COMMENCE = sessionStorage.getItem('je_commence') !== 'false';

    // ── État ──
    let motSecret = '';
    let saisieInit = '';
    let saisieEnCours = '';
    let positionActive2 = null;
    let cMonTour = JE_COMMENCE;
    let partieTerminee = false;
    let scoreA = 0, scoreB = 0;
    let derniereAdvProp = '';
    let derniereAdvScore = null;

    // Mot de l'adversaire simulé pour les tests
    const MOT_ADVERSAIRE = 'LAIT'; // sera fourni par Supabase

    // ── Init ──
    document.getElementById('header-longueur').textContent = LONGUEUR + ' lettres';
    document.getElementById('init-adversaire').textContent = 'Contre : ' + ADV_PSEUDO;
    document.getElementById('label-adversaire').textContent = ADV_PSEUDO;
    afficherCasesInit();

    function afficherCasesInit() {
        const el = document.getElementById('cases-init');
        el.innerHTML = '';
        for (let i = 0; i < LONGUEUR; i++) {
            const div = document.createElement('div');
            div.classList.add('case-mot-secret');
            div.textContent = saisieInit[i] || '';
            el.appendChild(div);
        }
    }

    function ajouterLettreInit(l) {
        if (saisieInit.length < LONGUEUR) {
            saisieInit += l;
            afficherCasesInit();
        }
    }

    function effacerInit() {
        saisieInit = saisieInit.slice(0, -1);
        afficherCasesInit();
    }

    function validerMotSecret() {
        if (saisieInit.length !== LONGUEUR) return;
        if (!(saisieInit in (window.DICO || {})) && Object.keys(window.DICO || {}).length > 0) {
            document.getElementById('init-sous').textContent = 'Mot inconnu du dictionnaire';
            document.getElementById('init-sous').style.color = '#ff4444';
            return;
        }
        motSecret = saisieInit;
        demarrerPartie();
    }

    function demarrerPartie() {
        document.getElementById('phase-init').style.display = 'none';
        document.getElementById('phase-jeu').style.display = 'block';
        document.getElementById('btn-chat-flottant').style.display = 'flex';
        afficherMonMot();
        afficherCasesAdv();
        afficherSaisie();
        majTour();
        // TODO : envoyer motSecret à Supabase (chiffré)
    }

    // ── Affichage mon mot secret ──
    function afficherMonMot() {
        const el = document.getElementById('cases-mon-mot');
        el.innerHTML = '';
        for (let i = 0; i < LONGUEUR; i++) {
            const div = document.createElement('div');
            div.classList.add('case-mot-secret');
            div.id = 'mon-mot-' + i;
            div.textContent = motSecret[i];
            el.appendChild(div);
        }
    }

    // ── Animation scan quand l'adversaire propose ──
    function animerScan(proposition, score) {
        return new Promise(resolve => {
            // Identifier les positions bien placées
            const bienPlacees = [];
            for (let i = 0; i < LONGUEUR; i++) {
                if (proposition[i] === motSecret[i]) bienPlacees.push(i);
            }
            for (let i = 0; i < LONGUEUR; i++) {
                const el = document.getElementById('mon-mot-' + i);
                if (!el) continue;
                setTimeout(() => {
                    if (bienPlacees.includes(i)) {
                        el.classList.add('scan-ok');
                        setTimeout(() => el.classList.remove('scan-ok'), 800);
                    } else {
                        el.classList.add('scan');
                        setTimeout(() => el.classList.remove('scan'), 500);
                    }
                }, i * 150);
            }
            setTimeout(() => {
                afficherDerniereAdvProp(proposition, score);
                resolve();
            }, LONGUEUR * 150 + 700);
        });
    }

    function afficherDerniereAdvProp(proposition, score) {
        // Mettre à jour les lettres découvertes par l'adversaire
        for (let i = 0; i < LONGUEUR; i++) {
            if (proposition[i] === motSecret[i]) {
                advDecouvertes[i] = proposition[i];
            }
        }
        majAffichageAdv();
    }

    // ── Avancement adversaire ──
    const advDecouvertes = new Array(LONGUEUR).fill(null); // lettres bien placées découvertes

    function afficherCasesAdv() {
        // Points de progression
        const pts = document.getElementById('adv-points');
        pts.innerHTML = '';
        for (let i = 0; i < LONGUEUR; i++) {
            const d = document.createElement('div');
            d.classList.add('adv-point');
            d.id = 'adv-pt-' + i;
            pts.appendChild(d);
        }
        // Cases lettres
        const el = document.getElementById('cases-adv');
        el.innerHTML = '';
        for (let i = 0; i < LONGUEUR; i++) {
            const div = document.createElement('div');
            div.classList.add('case-adv');
            div.id = 'adv-case-' + i;
            el.appendChild(div);
        }
        majAffichageAdv();
    }

    function majAffichageAdv() {
        let nb = 0;
        for (let i = 0; i < LONGUEUR; i++) {
            const caseEl = document.getElementById('adv-case-' + i);
            const ptEl = document.getElementById('adv-pt-' + i);
            if (advDecouvertes[i]) {
                if (caseEl) { caseEl.classList.add('decouverte'); caseEl.textContent = advDecouvertes[i]; }
                if (ptEl) ptEl.classList.add('trouve');
                nb++;
            }
        }
        const nbEl = document.getElementById('adv-nb');
        if (nbEl) nbEl.textContent = nb === 0 ? 'Aucune lettre trouvée'
            : nb === 1 ? '1 lettre trouvée'
            : nb + ' lettres trouvées';
    }

    // ── Affichage saisie ──
    function afficherSaisie() {
        const el = document.getElementById('affichage-saisie');
        el.innerHTML = '';
        for (let i = 0; i < LONGUEUR; i++) {
            const div = document.createElement('div');
            div.classList.add('case-lettre');
            if (saisieEnCours[i] && saisieEnCours[i] !== ' ') {
                div.classList.add('case-saisie');
                div.textContent = saisieEnCours[i];
            } else {
                div.classList.add('case-vide');
            }
            if (positionActive2 === i) div.classList.add('case-saisie-active');
            div.addEventListener('click', () => {
                if (!cMonTour || partieTerminee) return;
                positionActive2 = i;
                afficherSaisie();
            });
            el.appendChild(div);
        }
    }

    // ── Tour ──
    function majTour() {
        const tourEl = document.getElementById('header-tour');
        const clavier = document.getElementById('clavier-jeu');
        const saisieEl = document.getElementById('affichage-saisie');
        const msgEl = document.getElementById('msg-attente');

        if (cMonTour) {
            tourEl.textContent = 'Ton tour';
            tourEl.className = 'header-tour tour-moi';
            clavier.style.opacity = '1';
            clavier.style.pointerEvents = 'all';
            saisieEl.style.display = 'flex';
            msgEl.style.display = 'none';
        } else {
            tourEl.textContent = 'Tour de ' + ADV_PSEUDO;
            tourEl.className = 'header-tour tour-adversaire';
            clavier.style.opacity = '0.3';
            clavier.style.pointerEvents = 'none';
            saisieEl.style.display = 'none';
            msgEl.style.display = 'block';
            // Simuler la proposition adversaire après 2s (sera remplacé par Supabase)
            setTimeout(() => simulerAdversaire(), 2000);
        }

        const shortA = MON_PSEUDO.substring(0, 3).toUpperCase();
        const shortB = ADV_PSEUDO.substring(0, 3).toUpperCase();
        document.getElementById('header-score').textContent = shortA + ' ' + scoreA + ' — ' + shortB + ' ' + scoreB;
        demarrerTimer();
        majTimerAffichage();
    }

    // ── Simulation adversaire (pour tests sans Supabase) ──
    const propositionsAdv = ['ABAT', 'BALS', 'CAVE', 'DARD', 'GAIN', 'LAIT'];
    let indexAdv = 0;

    function simulerAdversaire() {
        if (partieTerminee) return;
        const prop = propositionsAdv[indexAdv % propositionsAdv.length];
        indexAdv++;
        let score = 0;
        for (let i = 0; i < LONGUEUR; i++) {
            if (prop[i] === motSecret[i]) score++;
        }
        recevoirPropositionAdversaire(prop, score);
    }

    async function recevoirPropositionAdversaire(proposition, score) {
        await animerScan(proposition, score);
        if (score === LONGUEUR) {
            scoreB++;
            finPartie(false, proposition);
            return;
        }
        cMonTour = true;
        majTour();
    }

    // ── Saisie joueur ──
    function ajouterLettre(l) {
        if (!cMonTour || partieTerminee) return;
        if (positionActive2 !== null) {
            const arr = saisieEnCours.padEnd(LONGUEUR, ' ').split('');
            arr[positionActive2] = l;
            saisieEnCours = arr.join('').replace(/\s+$/, '');
            let next = null;
            for (let i = positionActive2 + 1; i < LONGUEUR; i++) {
                if (!saisieEnCours[i] || saisieEnCours[i] === ' ') { next = i; break; }
            }
            if (next === null) for (let i = 0; i < positionActive2; i++) {
                if (!saisieEnCours[i] || saisieEnCours[i] === ' ') { next = i; break; }
            }
            positionActive2 = next;
        } else {
            if (saisieEnCours.length < LONGUEUR) saisieEnCours += l;
        }
        afficherSaisie();
    }

    function effacer() {
        if (!cMonTour || partieTerminee) return;
        if (positionActive2 !== null) {
            const arr = saisieEnCours.padEnd(LONGUEUR, ' ').split('');
            arr[positionActive2] = ' ';
            saisieEnCours = arr.join('').replace(/\s+$/, '');
        } else {
            saisieEnCours = saisieEnCours.slice(0, -1);
        }
        afficherSaisie();
    }

    function valider() {
        if (!cMonTour || partieTerminee) return;
        const prop = saisieEnCours.toUpperCase();
        const errEl = document.getElementById('error-jeu2');

        if (prop.length !== LONGUEUR) {
            errEl.textContent = 'Mot trop court';
            errEl.style.display = 'block';
            setTimeout(() => errEl.style.display = 'none', 1500);
            return;
        }

        if (Object.keys(window.DICO || {}).length > 0 && !(prop in window.DICO)) {
            errEl.textContent = 'Mot inconnu du dictionnaire';
            errEl.style.display = 'block';
            setTimeout(() => errEl.style.display = 'none', 1500);
            return;
        }

        errEl.style.display = 'none';

        // Compter lettres bien placées contre le mot de l'adversaire
        let score = 0;
        for (let i = 0; i < LONGUEUR; i++) {
            if (prop[i] === MOT_ADVERSAIRE[i]) score++;
        }

        // Ajouter à mes propositions
        ajouterLigneProp(prop, score);
        saisieEnCours = '';
        positionActive2 = null;
        afficherSaisie();

        if (score === LONGUEUR) {
            scoreA++;
            finPartie(true, MOT_ADVERSAIRE);
            return;
        }

        // Passer le tour
        cMonTour = false;
        majTour();
        // TODO : envoyer prop + score à Supabase
    }

    function ajouterLigneProp(mot, score) {
        const liste = document.getElementById('liste-props');
        const ligne = document.createElement('div');
        ligne.classList.add('ligne-prop');
        const cls = score === LONGUEUR ? 'score-gagne' : 'score-' + score;
        ligne.innerHTML = `
            <span class="prop-mot">${mot}</span>
            <span class="prop-score ${cls}">${score === LONGUEUR ? '🏆' : score}</span>
        `;
        liste.appendChild(ligne);
        liste.scrollTop = liste.scrollHeight;
    }

    // ── Fin de partie ──
    function finPartie(gagne, motAdv) {
        partieTerminee = true;
        arreterTimer();
        const overlay = document.getElementById('overlay-fin');
        const titre = document.getElementById('fin-titre');
        const info = document.getElementById('fin-info');
        const motEl = document.getElementById('fin-mot-adv');

        if (gagne) {
            titre.textContent = 'Gagné !';
            titre.className = 'fin-titre fin-gagne';
            info.textContent = 'Tu as trouvé le mot de ' + ADV_PSEUDO;
        } else {
            titre.textContent = 'Perdu !';
            titre.className = 'fin-titre fin-perdu';
            info.textContent = ADV_PSEUDO + ' a trouvé ton mot';
        }
        motEl.textContent = motAdv;
        overlay.classList.add('visible');
    }

    function demanderRevanche() {
        // Inverser les rôles pour la revanche
        const ancienMoi = sessionStorage.getItem('mon_pseudo');
        const ancienAdv = sessionStorage.getItem('adv_pseudo');
        sessionStorage.setItem('mon_pseudo', ancienAdv);
        sessionStorage.setItem('adv_pseudo', ancienMoi);
        sessionStorage.setItem('revanche', 'true');
        sessionStorage.setItem('longueur_preferee', LONGUEUR);
        window.location.href = 'invitation.html';
    }

    // Clavier physique
    document.addEventListener('keydown', e => {
        if (document.getElementById('phase-init').style.display !== 'none') {
            if (e.key === 'Enter') validerMotSecret();
            else if (e.key === 'Backspace') effacerInit();
            else if (/^[a-zA-Z]$/.test(e.key)) ajouterLettreInit(e.key.toUpperCase());
        } else {
            if (e.key === 'Enter') valider();
            else if (e.key === 'Backspace') effacer();
            else if (/^[a-zA-Z]$/.test(e.key)) ajouterLettre(e.key.toUpperCase());
        }
    });

    // ── Dialogue ──
    let messagesNonLus = 0;
    let chatOuvert = false;

    function toggleChat() {
        const popup = document.getElementById('popup-chat');
        const ov = document.getElementById('overlay-chat');
        chatOuvert = !chatOuvert;
        popup.classList.toggle('visible', chatOuvert);
        if (ov) ov.style.display = chatOuvert ? 'block' : 'none';
        if (chatOuvert) {
            messagesNonLus = 0;
            const badge = document.getElementById('badge-chat');
            badge.textContent = '';
            badge.classList.remove('visible');
            const zone = document.getElementById('dialogue-messages');
            zone.scrollTop = zone.scrollHeight;
        }
    }

    function envoyerReaction(msg) {
        ajouterMessage(msg, true);
        // TODO : envoyer via Supabase
    }

    function envoyerMessage() {
        const input = document.getElementById('dialogue-input');
        const msg = input.value.trim();
        if (!msg) return;
        ajouterMessage(msg, true);
        input.value = '';
        // TODO : envoyer via Supabase
    }

    function ajouterMessage(msg, estMoi) {
        const zone = document.getElementById('dialogue-messages');
        const ligne = document.createElement('div');
        ligne.classList.add('msg-ligne', estMoi ? 'msg-moi' : 'msg-adv');
        const pseudo = estMoi ? MON_PSEUDO : ADV_PSEUDO;
        ligne.innerHTML = `<span class="msg-pseudo">${pseudo}</span>${msg}`;
        zone.appendChild(ligne);
        if (chatOuvert) {
            zone.scrollTop = zone.scrollHeight;
        } else if (!estMoi) {
            // Message reçu + chat fermé → badge
            messagesNonLus++;
            const badge = document.getElementById('badge-chat');
            badge.textContent = messagesNonLus;
            badge.classList.add('visible');
        }
    }

    // ── Timeout et abandon ──
    const TIMEOUT_TOUR = 120; // secondes
    let timerTour = null;
    let secondesRestantes = TIMEOUT_TOUR;

    function majTimerAffichage() {
        const el = document.getElementById('header-timer');
        if (!el) return;
        const m = Math.floor(secondesRestantes / 60);
        const s = secondesRestantes % 60;
        el.textContent = m + ':' + String(s).padStart(2, '0');
        if (secondesRestantes <= 30) { el.style.color = '#ff4444'; el.style.fontWeight = '700'; }
        else if (secondesRestantes <= 60) { el.style.color = '#ff9900'; el.style.fontWeight = '600'; }
        else { el.style.color = 'rgba(0,191,255,0.7)'; el.style.fontWeight = '400'; }
    }

    function demarrerTimer() {
        arreterTimer();
        secondesRestantes = TIMEOUT_TOUR;
        timerTour = setInterval(() => {
            secondesRestantes--;
            majTimerAffichage();
            if (secondesRestantes <= 0) {
                arreterTimer();
                afficherTimeout();
            }
        }, 1000);
    }

    function arreterTimer() {
        if (timerTour) { clearInterval(timerTour); timerTour = null; }
    }

    function afficherTimeout() {
        const modal = document.getElementById('modal-timeout');
        const titre = document.getElementById('timeout-titre');
        const info = document.getElementById('timeout-info');
        if (cMonTour) {
            titre.textContent = 'Temps écoulé !';
            info.textContent = 'Tu as mis trop de temps à jouer.';
        } else {
            titre.textContent = 'Adversaire inactif';
            info.textContent = ADV_PSEUDO + ' n\'a pas joué dans les temps.';
        }
        modal.classList.add('visible');
    }

    function proposerAbandon() {
        arreterTimer();
        const modal = document.getElementById('modal-timeout');
        document.getElementById('timeout-titre').textContent = 'Abandonner ?';
        document.getElementById('timeout-info').textContent = 'Tu vas quitter la partie en cours.';
        modal.classList.add('visible');
    }

    function confirmerAbandon() {
        document.getElementById('modal-timeout').classList.remove('visible');
        // TODO : notifier Supabase
        window.location.href = 'multi.html';
    }
